<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0; padding:0; background-color:#f9fafb; font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table width="600" cellpadding="0" cellspacing="0" border="0"
               style="max-width:600px; background:#ffffff; border:1px solid #e5e7eb; border-radius:12px; padding:32px;">

          <!-- Title -->
          <tr>
            <td style="padding:0 0 20px 0;">
              <h2 style="margin:0; color:#111827; font-size:22px;">{{title}}</h2>
            </td>
          </tr>

          <!-- Intro -->
          <tr>
            <td style="padding:0 0 12px 0; color:#374151; line-height:1.6;">
              {{intro}}
            </td>
          </tr>

          <!-- CTA instruction -->
          <tr>
            <td style="padding:0 0 24px 0; color:#374151; line-height:1.6;">
              {{cta_text}}
            </td>
          </tr>

          <!-- Button (VML for Outlook + standard anchor) -->
          <tr>
            <td align="center" style="padding:0 0 28px 0;">
              <!--[if mso]>
              <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml"
                           xmlns:w="urn:schemas-microsoft-com:office:word"
                           href="{{reset_link}}"
                           style="height:46px; v-text-anchor:middle; width:260px;"
                           arcsize="13%"
                           fillcolor="#3b82f6"
                           stroke="f">
                <w:anchorlock/>
                <center style="color:#ffffff; font-family:Arial,sans-serif; font-size:15px; font-weight:bold;">
                  {{cta_label}}
                </center>
              </v:roundrect>
              <![endif]-->
              <!--[if !mso]><!-->
              <a href="{{reset_link}}"
                 target="_blank"
                 style="
                   display:inline-block;
                   padding:13px 30px;
                   background-color:#3b82f6;
                   color:#ffffff !important;
                   text-decoration:none;
                   font-family:Arial,sans-serif;
                   font-size:15px;
                   font-weight:bold;
                   border-radius:6px;
                   mso-hide:all;
                 ">
                {{cta_label}}
              </a>
              <!--<![endif]-->
            </td>
          </tr>

          <!-- Validity -->
          <tr>
            <td style="color:#374151; font-size:14px; line-height:1.5;">
              {{validity}}
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
