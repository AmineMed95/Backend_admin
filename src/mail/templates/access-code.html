<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0; padding:0; background-color:#f9fafb; font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table width="600" cellpadding="0" cellspacing="0" border="0"
               style="max-width:600px; background:#ffffff; border:1px solid #e5e7eb; border-radius:12px; padding:32px;">

          <!-- App title -->
          <tr>
            <td style="padding:0 0 16px 0;">
              <h2 style="margin:0; color:#1a56db; font-size:22px;">eKYC</h2>
            </td>
          </tr>

          <!-- Greeting -->
          <tr>
            <td style="padding:0 0 8px 0; color:#374151; line-height:1.6;">
              {{greeting}} <strong>{{first_name}}</strong>,
            </td>
          </tr>

          <!-- Intro -->
          <tr>
            <td style="padding:0 0 24px 0; color:#374151; line-height:1.6;">
              {{intro}}
            </td>
          </tr>

          <!-- Access code box -->
          <tr>
            <td style="padding:0 0 24px 0;">
              <div style="
                background:#f3f4f6;
                border:2px dashed #1a56db;
                border-radius:8px;
                padding:24px;
                text-align:center;
              ">
                <p style="margin:0 0 8px 0; font-size:14px; color:#6b7280;">{{label}}</p>
                <p style="
                  margin:0;
                  font-size:36px;
                  letter-spacing:8px;
                  color:#1a56db;
                  font-family:monospace;
                  font-weight:bold;
                ">{{access_code}}</p>
              </div>
            </td>
          </tr>

          <!-- Warning -->
          <tr>
            <td style="padding:0 0 8px 0; color:#ef4444; font-size:13px; line-height:1.5;">
              {{warning}}
            </td>
          </tr>

          <!-- Contact -->
          <tr>
            <td style="color:#6b7280; font-size:13px; line-height:1.5;">
              {{contact}}
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
